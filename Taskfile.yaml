  diff-control-plane:
    desc: Show CDK diff for control plane via CDK launcher
    vars:
      SAAS_ENV: "{{.saas_env}}"
    preconditions:
      - sh: test -n "{{.SAAS_ENV}}"
        msg: "saas_env parameter is required. Usage: task diff-control-plane saas_env=<env>"
    dir: control-plane/infra
    cmds:
      - npx cdk diff -a "npx tsx launcher.ts" -c environment={{.SAAS_ENV}}

  deploy-control-plane:
    desc: Deploy control plane infrastructure via CDK launcher
    vars:
      SAAS_ENV: "{{.saas_env}}"
    preconditions:
      - sh: test -n "{{.SAAS_ENV}}"
        msg: "saas_env parameter is required. Usage: task deploy-control-plane saas_env=<env>"
    dir: control-plane/infra
    cmds:
