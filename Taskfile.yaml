  new-cdk-cp:
    desc: Create new control plane environment configuration
    vars:
      SAAS_ENV: "{{.saas_env}}"
      URL_PREFIX: '{{.url_prefix | default "cmddev"}}'
      HOSTED_ZONE_ID: '{{.hosted_zone_id | default "ZGV00PO5Z7OWH"}}'
      CREATE_AMPLIFY_APPS: "{{.create_amplify_apps}}"
      AMPLIFY_BRANCH: "{{.amplify_branch}}"
      PROD_DNS_LAYOUT: "{{.prod_dns_layout}}"
      ENABLE_AUTO_SUB_DOMAIN: "{{.enable_auto_sub_domain}}"
      TOP_LEVEL_DOMAIN: "{{.top_level_domain}}"
    preconditions:
      - sh: test -n "{{.SAAS_ENV}}"
        msg: "saas_env parameter is required. Usage: task new-cdk-cp saas_env=<env> [url_prefix=...] [hosted_zone_id=...] [create_amplify_apps=...] [amplify_branch=...] [prod_dns_layout=...] [enable_auto_sub_domain=...]"
    cmds:
      - |
        set -euo pipefail
        ENV_FILE="control-plane/infra/config/{{.SAAS_ENV}}.json"
        if [ -f "$ENV_FILE" ]; then
          echo "Control-plane config $ENV_FILE already exists. Aborting to avoid overwrite."
          exit 1
        fi
        ./scripts/new-cdk-controlplane-conf.sh "{{.SAAS_ENV}}" "{{.URL_PREFIX}}" "{{.HOSTED_ZONE_ID}}" "{{.CREATE_AMPLIFY_APPS}}" "{{.AMPLIFY_BRANCH}}" "{{.PROD_DNS_LAYOUT}}" "{{.ENABLE_AUTO_SUB_DOMAIN}}" "{{.TOP_LEVEL_DOMAIN}}"

  new-cdk-env:
    desc: Create new application plane environment configuration
    vars:
      SAAS_ENV: "{{.saas_env}}"
      ACCOUNT: '{{.account | default "078680276960"}}'
      REGION: '{{.region | default "us-east-2"}}'
      PREFIX: '{{.prefix | default "cmd-saas"}}'
      DOMAIN_PREFIX: '{{.domain_prefix | default "cmddev"}}'
      HOSTED_ZONE_ID: '{{.hosted_zone_id | default "ZGV00PO5Z7OWH"}}'
      DEFAULT_TENANT_CODE: '{{.default_tenant_code | default "devcorp"}}'
      TOP_LEVEL_DOMAIN: '{{.top_level_domain | default "saas.cmddev.thermofisher.com"}}'
      CREATE_AMPLIFY_APPS: "{{.create_amplify_apps}}"
      AMPLIFY_BRANCH: "{{.amplify_branch}}"
      TENANT_MALWARE_PROTECTION_OPTOUT: '{{.tenant_malware_protection_optout}}'
      PROD_DNS_LAYOUT: "{{.prod_dns_layout}}"
      ENABLE_AUTO_SUB_DOMAIN: "{{.enable_auto_sub_domain}}"
      ENABLE_FEATURES: "{{.enable_features}}"
    preconditions:
      - sh: test -n "{{.SAAS_ENV}}"
        msg: "saas_env parameter is required. Usage: task new-cdk-env saas_env=<env> [account=...] [region=...] [prefix=...] [domain_prefix=...] [hosted_zone_id=...] [default_tenant=...] [top-level-domain=...] [create_amplify_apps=...] [amplify_branch=...] [tenant_malware_protection_optout=...] [prod_dns_layout=...] [enable_auto_sub_domain=...] [enable_features=...]"
    cmds:
      - ./scripts/new-cdk-env.sh "{{.SAAS_ENV}}" "{{.ACCOUNT}}" "{{.REGION}}" "{{.PREFIX}}" "{{.DOMAIN_PREFIX}}" "{{.HOSTED_ZONE_ID}}" "{{.DEFAULT_TENANT_CODE}}" "{{.TOP_LEVEL_DOMAIN}}" "{{.CREATE_AMPLIFY_APPS}}" "{{.AMPLIFY_BRANCH}}" "{{.TENANT_MALWARE_PROTECTION_OPTOUT}}" "{{.PROD_DNS_LAYOUT}}" "{{.ENABLE_AUTO_SUB_DOMAIN}}" "{{.ENABLE_FEATURES}}"
