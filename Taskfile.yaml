      REPO_ROOT: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        set -euo pipefail
        find . -name "go.mod" {{.GO_EXCLUDE_PATHS}} | xargs -P{{.GO_NUM_PARALLEL}} -I {} bash -c '
          set -euo pipefail
          moddir=$(dirname "$1")
          echo "Linting module in $moddir"
          cd "$moddir" && golangci-lint run --config="$REPO_ROOT/.golangci.yaml"
          cd - > /dev/null
        ' _ {}

  go-lint-app-plane-identity:
