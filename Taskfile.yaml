    cmds:
      - bash scripts/new-cdk-tenant.sh "{{.TENANT_CODE}}" "{{.URL_PREFIX}}" "{{.HOSTED_ZONE_ID}}" "{{.SAAS_ENV}}" "{{.SAAS_TENANT_REGION}}"
