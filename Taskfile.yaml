    cmds:
      - |
        set -euo pipefail
        for solution in $(find . \( -name "*.slnx" -o -name "*.sln" \) {{.DOTNET_EXCLUDE_PATHS}}); do
          solutiondir=$(dirname "$solution")
          solutionfile=$(basename "$solution")
          echo "Linting solution in $solutiondir"
          cd "$solutiondir" && dotnet format "$solutionfile" --verify-no-changes
          cd - > /dev/null
        done

  dotnet-fmt:
    desc: Formats all .NET solutions
    preconditions:
      - sh: command -v dotnet >/dev/null 2>&1
        msg: |
          .NET SDK is not installed. Please install .NET 10 SDK first:
            https://dotnet.microsoft.com/en-us/download/dotnet/10.0
    cmds:
      - |
        set -euo pipefail
        for solution in $(find . \( -name "*.slnx" -o -name "*.sln" \) {{.DOTNET_EXCLUDE_PATHS}}); do
          solutiondir=$(dirname "$solution")
          solutionfile=$(basename "$solution")
          echo "Formatting solution in $solutiondir"
          cd "$solutiondir" && dotnet format "$solutionfile"
          cd - > /dev/null
        done

  dotnet-clean:
    desc: Cleans all .NET solutions with dotnet clean
    preconditions:
      - sh: command -v dotnet >/dev/null 2>&1
        msg: |
          .NET SDK is not installed. Please install .NET 10 SDK first:
            https://dotnet.microsoft.com/en-us/download/dotnet/10.0
    cmds:
      - |
        set -euo pipefail
        for solution in $(find . \( -name "*.slnx" -o -name "*.sln" \) {{.DOTNET_EXCLUDE_PATHS}}); do
          solutiondir=$(dirname "$solution")
          solutionfile=$(basename "$solution")
          echo "Cleaning solution in $solutiondir"
          cd "$solutiondir" && dotnet clean "$solutionfile"
          cd - > /dev/null
        done

  dotnet-deep-clean:
    desc: Removes .NET build and test artifacts under .NET solution roots
    preconditions:
      - sh: command -v dotnet >/dev/null 2>&1
        msg: |
          .NET SDK is not installed. Please install .NET 10 SDK first:
            https://dotnet.microsoft.com/en-us/download/dotnet/10.0
    cmds:
      - |
        set -euo pipefail
        for solution in $(find . \( -name "*.slnx" -o -name "*.sln" \) {{.DOTNET_EXCLUDE_PATHS}}); do
          solutiondir=$(dirname "$solution")
          echo "Deep cleaning solution artifacts in $solutiondir"
          find "$solutiondir" \
            \( -type d \( -name bin -o -name obj -o -name TestResults \) \) \
            -prune -exec rm -rf -- {} \;
        done

