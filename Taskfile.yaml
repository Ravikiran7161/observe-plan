  dotnet-build:
    desc: Builds all .NET solutions
    preconditions:
      - sh: command -v dotnet >/dev/null 2>&1
        msg: |
          .NET SDK is not installed. Please install .NET 10 SDK first:
            https://dotnet.microsoft.com/en-us/download/dotnet/10.0
    cmds:
      - |
        set -euo pipefail
        for solution in $(find . \( -name "*.slnx" -o -name "*.sln" \) {{.DOTNET_EXCLUDE_PATHS}}); do
          solutiondir=$(dirname "$solution")
          solutionfile=$(basename "$solution")
          echo "Building solution in $solutiondir"
          cd "$solutiondir" && dotnet build "$solutionfile"
          cd - > /dev/null
        done

  dotnet-test:
    desc: Tests all .NET solutions
    preconditions:
      - sh: command -v dotnet >/dev/null 2>&1
        msg: |
          .NET SDK is not installed. Please install .NET 10 SDK first:
            https://dotnet.microsoft.com/en-us/download/dotnet/10.0
    cmds:
      - |
        set -euo pipefail
        for solution in $(find . \( -name "*.slnx" -o -name "*.sln" \) {{.DOTNET_EXCLUDE_PATHS}}); do
          solutiondir=$(dirname "$solution")
          solutionfile=$(basename "$solution")
          echo "Testing solution in $solutiondir"
          cd "$solutiondir" && dotnet test "$solutionfile"
          cd - > /dev/null
        done

  dotnet-lint:
    desc: Verifies formatting for all .NET solutions
    preconditions:
      - sh: command -v dotnet >/dev/null 2>&1
        msg: |
          .NET SDK is not installed. Please install .NET 10 SDK first:
