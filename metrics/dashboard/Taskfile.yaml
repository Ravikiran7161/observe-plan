version: '3'

vars:
  GO_BIN_PATH: bin

tasks:
  go-mod:
    desc: Tidy and verify module
    cmds:
      - go mod tidy
      - go mod verify

  lint:
    desc: Run golangci lint
    cmds:
      - golangci-lint run ./... --config=../../../.golangci.yaml

  build:
    desc: Build Go binaries
    cmds:
      - mkdir -p {{.GO_BIN_PATH}}
      - go build -o {{.GO_BIN_PATH}}/handler ./lambda/handler

  test:
    desc: Run Go tests with coverage
    cmds:
      - go clean -testcache
      - gotestsum --format=standard-verbose ./... && go test -coverprofile=coverage.out -covermode=atomic ./...
